name: Test Packaged SDKs

on:
  push:
    branches:
      - main
      - workflow-test/*

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-node-sdk:
    runs-on: ${{ matrix.platform == 'linux' && 'ubuntu-latest' || matrix.platform == 'macos' && 'macos-13' || matrix.platform == 'windows' && 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        platform: ['linux']
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/test-server-package
        with:
          platform: ${{ matrix.platform }}
          sdk_name: 'node-server-sdk'
          sdk_relay_dir: 'node-sdk-relay'
          service_account_key: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          sdk_testing_project_id: ${{ vars.SDK_TESTING_PROJECT_ID }}
          sdk_testing_region: ${{ vars.SDK_TESTING_REGION }}

  test-php-sdk:
    runs-on: ${{ matrix.platform == 'linux' && 'ubuntu-latest' || matrix.platform == 'macos' && 'macos-13' || matrix.platform == 'windows' && 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        platform: ['linux']
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/test-server-package
        with:
          platform: ${{ matrix.platform }}
          sdk_name: 'eppo/php-sdk'
          sdk_relay_dir: 'php-sdk-relay'
          service_account_key: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          sdk_testing_project_id: ${{ vars.SDK_TESTING_PROJECT_ID }}
          sdk_testing_region: ${{ vars.SDK_TESTING_REGION }}

  test-python-sdk:
    runs-on: ${{ matrix.platform == 'linux' && 'ubuntu-latest' || matrix.platform == 'macos' && 'macos-13' || matrix.platform == 'windows' && 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        platform: ['linux']
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/test-server-package
        with:
          platform: ${{ matrix.platform }}
          sdk_name: 'python-sdk'
          sdk_relay_dir: 'python-sdk-relay'
          service_account_key: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          sdk_testing_project_id: ${{ vars.SDK_TESTING_PROJECT_ID }}
          sdk_testing_region: ${{ vars.SDK_TESTING_REGION }}

  test-ruby-sdk:
    runs-on: ${{ matrix.platform == 'linux' && 'ubuntu-latest' || matrix.platform == 'macos' && 'macos-13' || matrix.platform == 'windows' && 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        platform: ['linux']
    steps:
      - uses: actions/checkout@v4
      # Ruby SDK ships a native Rust extension via rb_sys; building the gem
      # requires both a user-writable bundler install and a Rust toolchain,
      # neither of which is available out of the box on ubuntu-latest. The
      # cargo cache cuts cold-run compile time (~70s on a fresh runner) down
      # to a few seconds for subsequent runs, keeping the total relay build
      # comfortably inside test-sdk.sh's wait_for_url window.
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      - uses: dtolnay/rust-toolchain@stable
      # The build-and-run.sh script clones the SDK into ./tmp and then
      # `rm -rf tmp` after the build, so caching `target/` is moot — but
      # caching ~/.cargo/{registry,git} (rust-cache's default) avoids
      # re-downloading ~200 crates on every cold run.
      - uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false
          shared-key: ruby-sdk-relay-cargo
      - uses: ./.github/actions/test-server-package
        with:
          platform: ${{ matrix.platform }}
          sdk_name: 'ruby'
          sdk_relay_dir: 'ruby-sdk-relay'
          service_account_key: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          sdk_testing_project_id: ${{ vars.SDK_TESTING_PROJECT_ID }}
          sdk_testing_region: ${{ vars.SDK_TESTING_REGION }}

  test-go-sdk:
    runs-on: ${{ matrix.platform == 'linux' && 'ubuntu-latest' || matrix.platform == 'macos' && 'macos-13' || matrix.platform == 'windows' && 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        platform: ['linux']
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/test-server-package
        with:
          platform: ${{ matrix.platform }}
          sdk_name: 'go-sdk'
          sdk_relay_dir: 'go-sdk-relay'
          service_account_key: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          sdk_testing_project_id: ${{ vars.SDK_TESTING_PROJECT_ID }}
          sdk_testing_region: ${{ vars.SDK_TESTING_REGION }}
